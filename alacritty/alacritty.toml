
# [env]
# TERM = "xterm-256color"

[colors]
draw_bold_text_with_bright_colors = true

[window]
padding = { x = 0, y = 0 }
decorations = "none"
opacity = 1
# opacity = 0.8
# blur = true

[font]
size = 16

  [font.normal]
  family = "JetbrainsMono Nerd Font Mono"

[general]
import = [
    "~/.config/alacritty/themes/themes/terminal_app.toml"
]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

# Mở Alacritty là tự vào tmux (attach session cũ hoặc khôi phục sau reboot)
[terminal.shell]
program = "__TMUX_LAUNCH__"
args = []

# ----------------------------------------------------------------------
# Mở URL bằng CHUỘT: chỉ Ctrl + click (không Shift, không binding bàn phím).
# macOS: nếu Ctrl+click không ăn (bị OS hiểu thành right-click), đổi 1 chữ
#        mods = "Control"  ->  mods = "Command"  (= Cmd+click, chắc ăn trên Mac).
# Nếu trong tmux mà click không tới Alacritty: tmux đang giữ chuột — tắt nhanh
#        bằng Ctrl-a M, rồi Ctrl+click; bật lại Ctrl-a M khi xong.
# ----------------------------------------------------------------------
[hints]

[[hints.enabled]]
regex = '(https?://|mailto:|ftp://|ssh://|file://)[^\s"<>{}]+'
hyperlinks = true        # mở cả link OSC-8 (link "ẩn" sau chữ)
post_processing = true   # tự cắt ký tự thừa ở cuối URL
persist = false
command = { program = "open", args = [] }   # macOS mở bằng app mặc định
mouse = { enabled = true, mods = "Control" }
