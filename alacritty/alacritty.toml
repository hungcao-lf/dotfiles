
# [env]
# TERM = "xterm-256color"

[colors]
draw_bold_text_with_bright_colors = true

[window]
padding = { x = 0, y = 0 }
decorations = "none"
opacity = 1
# opacity = 0.8
# blur = true

[font]
size = 16

  [font.normal]
  family = "JetbrainsMono Nerd Font Mono"

[general]
import = [
    "~/.config/alacritty/themes/themes/terminal_app.toml"
]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

# Mở Alacritty là tự vào tmux (attach session cũ hoặc khôi phục sau reboot)
[terminal.shell]
program = "__TMUX_LAUNCH__"
args = []
