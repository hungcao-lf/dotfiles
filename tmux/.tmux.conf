# ~/.tmux.conf — cấu hình tmux cho dev (không dùng vim)
# Triết lý: phím trực giác, chuột bật sẵn, copy kiểu hệ điều hành thông thường.

# ----------------------------------------------------------------------
# Cơ bản
# ----------------------------------------------------------------------
# Đổi prefix từ Ctrl-b sang Ctrl-a (dễ bấm hơn)
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # bấm Ctrl-a hai lần để gửi Ctrl-a thật

# Màu sắc đúng (true color) cho terminal hiện đại
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Bật chuột: click chọn pane/window, kéo resize, cuộn scroll
set -g mouse on

# Đánh số window/pane bắt đầu từ 1 (bàn phím gần hơn 0)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on    # đánh số lại khi đóng window

# Lịch sử cuộn dài hơn
set -g history-limit 50000

# Phản hồi nhanh, không trễ khi bấm Esc
set -sg escape-time 10

# Báo khi có hoạt động ở window khác
setw -g monitor-activity on
set -g visual-activity off

# ----------------------------------------------------------------------
# Chia pane — dùng | và - cho trực giác
# ----------------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"   # chia dọc (trái/phải)
bind - split-window -v -c "#{pane_current_path}"   # chia ngang (trên/dưới)
unbind '"'
unbind %

# Tạo window mới giữ nguyên thư mục hiện tại
bind c new-window -c "#{pane_current_path}"

# ----------------------------------------------------------------------
# Di chuyển pane — dùng phím mũi tên (không cần hjkl của vim)
# ----------------------------------------------------------------------
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D

# Di chuyển pane không cần prefix: Alt + mũi tên
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Resize pane: prefix rồi giữ Shift + mũi tên (lặp được)
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

# Chuyển window nhanh: Alt + số (không cần prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ----------------------------------------------------------------------
# Copy mode — chế độ emacs (không phải vi), quen thuộc hơn
# ----------------------------------------------------------------------
setw -g mode-keys emacs

# Vào copy mode: Ctrl-a [  (hoặc cuộn chuột lên là tự vào).
# --- Copy bằng chuột ---
# Bôi đen rồi THẢ chuột: copy vào clipboard macOS (pbcopy) và GIỮ NGUYÊN vị trí
# đang xem. "no-clear" = KHÔNG thoát copy mode, KHÔNG nhảy về prompt.
# Xem xong bấm q hoặc Esc để thoát copy mode.
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "pbcopy"

# Double-click = copy nguyên TỪ; Triple-click = copy nguyên DÒNG.
# (đáng tin hơn kéo tay khi chỉ cần một từ/dòng)
bind -T copy-mode DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "pbcopy"
# Khi đang ở live prompt (chưa vào copy mode): double/triple-click cũng copy được
bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send -X select-word \; send -X copy-pipe-no-clear "pbcopy"
bind -n TripleClick1Pane select-pane \; copy-mode -M \; send -X select-line \; send -X copy-pipe-no-clear "pbcopy"

# Dán: Ctrl-a P (chữ hoa) — vì p đã dùng cho previous-window bên dưới
bind P paste-buffer

# Chuyển window: Ctrl-a n = next (mặc định), Ctrl-a p = previous
bind p previous-window

# Mẹo: nếu copy từ một app toàn-màn-hình chạy trong tmux (vd TUI của Claude Code,
# vim, less) mà chuột không ăn -> giữ Shift rồi kéo để dùng "selection gốc" của
# Alacritty (bỏ qua tmux), sau đó Cmd-C. Cách này luôn copy được.

# ----------------------------------------------------------------------
# Tiện ích
# ----------------------------------------------------------------------
# Reload config nhanh: Ctrl-a r
bind r source-file ~/.tmux.conf \; display-message "Đã reload ~/.tmux.conf"

# Phóng to / thu nhỏ pane đang chọn (zoom toàn window): Ctrl-a m — bấm lại để thu về
bind m resize-pane -Z

# Đóng pane/window có xác nhận
bind x confirm-before -p "Đóng pane này? (y/n)" kill-pane
bind X confirm-before -p "Đóng window này? (y/n)" kill-window
# ----------------------------------------------------------------------
# Giao diện status bar — powerline bo tròn
# ----------------------------------------------------------------------
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Session pill (mauve) + nắp tròn
set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold]  #S #[fg=#cba6f7,bg=#1e1e2e] "
set -g status-left-length 40

setw -g window-status-separator " "

# Window đang chọn: pill xanh bo tròn
setw -g window-status-current-format "#[fg=#89b4fa,bg=#1e1e2e]#[fg=#1e1e2e,bg=#89b4fa,bold] #I #W #[fg=#89b4fa,bg=#1e1e2e]"

# Window khác: chữ mờ
setw -g window-status-format "#[fg=#a6adc8,bg=#1e1e2e] #I #W "

setw -g window-status-activity-style "fg=#f9e2af,bg=#1e1e2e,bold"

# Bên phải: claude usage · pwd · nyan cat (animate) · đồng hồ peach bo tròn
set -g status-right "#(~/.config/tmux/tmux-claude.sh) #[fg=#6c7086,bg=#1e1e2e]#(~/.config/tmux/tmux-pwd.sh '#{pane_current_path}')  #[bg=#1e1e2e] #(~/.config/tmux/nyan-anim.sh) #[bg=#1e1e2e] #[fg=#fab387,bg=#1e1e2e]#[fg=#1e1e2e,bg=#fab387,bold]  %H:%M  %d-%b #[fg=#fab387,bg=#1e1e2e] "
set -g status-right-length 200

# Viền pane
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-lines heavy

# Tin nhắn / dòng lệnh
set -g message-style "bg=#cba6f7,fg=#1e1e2e,bold"
set -g message-command-style "bg=#313244,fg=#cdd6f4"
setw -g clock-mode-colour "#89b4fa"

# ----------------------------------------------------------------------
# Plugins (TPM) — tự động lưu & khôi phục session khi tắt/mở máy
# ----------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # lưu/khôi phục thủ công
set -g @plugin 'tmux-plugins/tmux-continuum'   # tự lưu định kỳ + tự khôi phục

# Lưu cả nội dung đang hiển thị trong pane (không chỉ layout)
set -g @resurrect-capture-pane-contents 'on'

# Lưu tự động mỗi 15 phút
set -g @continuum-save-interval '15'

# TỰ ĐỘNG KHÔI PHỤC session gần nhất mỗi khi tmux server khởi động lại
# (tức là khi bạn tắt máy rồi mở terminal gõ `tmux` lần đầu)
set -g @continuum-restore 'on'

# Auto-start lúc đăng nhập được xử lý ở phía Alacritty (terminal.shell chạy
# ~/.config/tmux/tmux-launch.sh) nên KHÔNG dùng cơ chế gõ phím của continuum
# (vừa cần quyền Accessibility, vừa gây lồng tmux). Để 'off'.
set -g @continuum-boot 'off'

# Khởi tạo TPM — DÒNG NÀY PHẢI NẰM Ở CUỐI FILE
run '~/.tmux/plugins/tpm/tpm'
